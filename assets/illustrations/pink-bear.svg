<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pink-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5CD" />
      <stop offset="100%" style="stop-color:#F472B6" />
    </linearGradient>
    <linearGradient id="pink-ear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6" />
      <stop offset="100%" style="stop-color:#EC4899" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
    <filter id="blush-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Left Ear -->
  <circle cx="30" cy="25" r="12" fill="url(#pink-ear)" filter="url(#shadow)" />

  <!-- Right Ear -->
  <circle cx="70" cy="25" r="12" fill="url(#pink-ear)" filter="url(#shadow)" />

  <!-- Head -->
  <circle cx="50" cy="50" r="35" fill="url(#pink-body)" filter="url(#shadow)" />

  <!-- Left Eye -->
  <circle cx="40" cy="45" r="3" fill="#1F2937" />

  <!-- Right Eye -->
  <circle cx="60" cy="45" r="3" fill="#1F2937" />

  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="6" ry="5" fill="white" opacity="0.8" />

  <!-- Left Blush -->
  <ellipse cx="30" cy="58" rx="5" ry="4" fill="#EC4899" opacity="0.4" filter="url(#blush-blur)" />

  <!-- Right Blush -->
  <ellipse cx="70" cy="58" rx="5" ry="4" fill="#EC4899" opacity="0.4" filter="url(#blush-blur)" />
</svg>
