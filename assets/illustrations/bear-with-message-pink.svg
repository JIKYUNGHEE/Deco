<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="msg-pink-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5CD" />
      <stop offset="100%" style="stop-color:#F472B6" />
    </linearGradient>
    <filter id="shadow-msg">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Speech Bubble -->
  <rect x="60" y="15" width="80" height="40" rx="20" fill="white" filter="url(#shadow-msg)" />
  <polygon points="65,50 75,50 70,60" fill="white" />
  <text x="100" y="40" font-size="16" text-anchor="middle" fill="#1F2937">Hi! 💕</text>

  <!-- Head -->
  <circle cx="50" cy="90" r="35" fill="url(#msg-pink-body)" filter="url(#shadow-msg)" />

  <!-- Ears -->
  <circle cx="30" cy="65" r="12" fill="#EC4899" filter="url(#shadow-msg)" />
  <circle cx="70" cy="65" r="12" fill="#EC4899" filter="url(#shadow-msg)" />

  <!-- Eyes -->
  <circle cx="40" cy="85" r="3" fill="#1F2937" />
  <circle cx="60" cy="85" r="3" fill="#1F2937" />

  <!-- Nose -->
  <ellipse cx="50" cy="95" rx="6" ry="5" fill="white" opacity="0.8" />

  <!-- Smile -->
  <path d="M 40 100 Q 50 105 60 100" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Blush -->
  <ellipse cx="30" cy="98" rx="5" ry="4" fill="#EC4899" opacity="0.4" />
  <ellipse cx="70" cy="98" rx="5" ry="4" fill="#EC4899" opacity="0.4" />
</svg>
