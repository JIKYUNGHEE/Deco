<svg width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pink-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCA5CD" />
      <stop offset="100%" style="stop-color:#F472B6" />
    </linearGradient>
    <linearGradient id="purple-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8B4FE" />
      <stop offset="100%" style="stop-color:#C084FC" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Pink Bear (Left) -->
  <g transform="translate(30, 40)">
    <!-- Ears -->
    <circle cx="10" cy="10" r="10" fill="#F472B6" filter="url(#shadow)" />
    <circle cx="40" cy="10" r="10" fill="#F472B6" filter="url(#shadow)" />
    <!-- Head -->
    <circle cx="25" cy="30" r="28" fill="url(#pink-body)" filter="url(#shadow)" />
    <!-- Eyes -->
    <circle cx="18" cy="28" r="2.5" fill="#1F2937" />
    <circle cx="32" cy="28" r="2.5" fill="#1F2937" />
    <!-- Nose -->
    <ellipse cx="25" cy="36" rx="5" ry="4" fill="white" opacity="0.8" />
    <!-- Blush -->
    <ellipse cx="12" cy="38" rx="4" ry="3" fill="#EC4899" opacity="0.4" />
    <ellipse cx="38" cy="38" rx="4" ry="3" fill="#EC4899" opacity="0.4" />
  </g>

  <!-- Heart in middle -->
  <g transform="translate(88, 35)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
          fill="#FF69B4" 
          opacity="0.9"
          transform="scale(1.2)" />
  </g>

  <!-- Purple Bear (Right) -->
  <g transform="translate(120, 40)">
    <!-- Ears -->
    <circle cx="10" cy="10" r="10" fill="#C084FC" filter="url(#shadow)" />
    <circle cx="40" cy="10" r="10" fill="#C084FC" filter="url(#shadow)" />
    <!-- Head -->
    <circle cx="25" cy="30" r="28" fill="url(#purple-body)" filter="url(#shadow)" />
    <!-- Eyes -->
    <circle cx="18" cy="28" r="2.5" fill="#1F2937" />
    <circle cx="32" cy="28" r="2.5" fill="#1F2937" />
    <!-- Nose -->
    <ellipse cx="25" cy="36" rx="5" ry="4" fill="white" opacity="0.8" />
    <!-- Blush -->
    <ellipse cx="12" cy="38" rx="4" ry="3" fill="#A855F7" opacity="0.4" />
    <ellipse cx="38" cy="38" rx="4" ry="3" fill="#A855F7" opacity="0.4" />
  </g>
</svg>
